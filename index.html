<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confidence Receipts Engine</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; background-color: #0d1117; color: #c9d1d9; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        h1, h2 { color: #58a6ff; }
        
        .form-card { background: #161b22; padding: 20px; border-radius: 8px; border: 1px solid #30363d; margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #8b949e; font-size: 0.9em; }
        input[type="text"], select { width: 100%; padding: 8px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 1em; box-sizing: border-box; }
        input[type="range"] { width: 100%; }
        .slider-value { display: inline-block; min-width: 30px; text-align: right; color: #58a6ff; font-weight: bold; }
        button { background: #238636; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 1em; font-weight: 600; width: 100%; }
        button:hover { background: #2ea043; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #161b22; padding: 20px; border-radius: 8px; border: 1px solid #30363d; text-align: center; }
        .stat-value { font-size: 2.5em; font-weight: bold; color: #f0f6fc; }
        .stat-label { color: #8b949e; text-transform: uppercase; font-size: 0.8em; }
        .receipt-list { display: flex; flex-direction: column; gap: 15px; }
        .receipt-card { background: #161b22; padding: 15px; border-radius: 8px; border-left: 4px solid #58a6ff; border-top: 1px solid #30363d; border-right: 1px solid #30363d; border-bottom: 1px solid #30363d; }
        .receipt-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .receipt-title { font-weight: bold; font-size: 1.1em; color: #f0f6fc; }
        .receipt-date { color: #8b949e; font-size: 0.9em; }
        .receipt-meta { font-size: 0.9em; display: flex; gap: 15px; }
        .category-tag { padding: 2px 8px; border-radius: 12px; background: #1f6feb; color: white; font-size: 0.8em; }
        .impact-tag { color: #3fb950; font-weight: bold; }
        .empty-state { text-align: center; color: #8b949e; margin-top: 50px; }
        .success-message { background: #238636; color: white; padding: 10px; border-radius: 6px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <h1>Confidence Receipts Wall 🎩</h1>
    <p>Undeniable evidence of capability and competence.</p>

    <div class="form-card">
        <h2 style="margin-top: 0;">Log Receipt</h2>
        <form id="receipt-form">
            <div class="form-group">
                <label for="title">What did you achieve/decide?</label>
                <input type="text" id="title" required placeholder="e.g., Deployed confidenceengine">
            </div>
            
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" required>
                    <option value="">Select category...</option>
                    <option value="Win">Win</option>
                    <option value="Completion">Completion</option>
                    <option value="Fast Decision">Fast Decision</option>
                    <option value="Smart Move">Smart Move</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="impact">Impact: <span class="slider-value" id="impact-value">5</span>/10</label>
                <input type="range" id="impact" min="1" max="10" value="5">
            </div>
            
            <div class="form-group">
                <label for="confidence">Confidence Level: <span class="slider-value" id="confidence-value">5</span>/10</label>
                <input type="range" id="confidence" min="1" max="10" value="5">
            </div>
            
            <button type="submit">Log Receipt</button>
            <div class="success-message" id="success-message">✅ Receipt logged successfully!</div>
        </form>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="total-receipts">0</div>
            <div class="stat-label">Receipts</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="streak-value">0</div>
            <div class="stat-label">Day Streak</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="total-impact">0</div>
            <div class="stat-label">Total Impact</div>
        </div>
    </div>

    <h2>Evidence Log</h2>
    <div id="receipt-container" class="receipt-list">
        <!-- Receipts will be injected here -->
    </div>

    <script>
        const STORAGE_KEY = 'confidence_receipts';
        
        // Initialize localStorage with default data from receipts.json on first load
        async function initializeData() {
            const existing = localStorage.getItem(STORAGE_KEY);
            if (!existing) {
                try {
                    const response = await fetch('receipts.json');
                    const data = await response.json();
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                } catch (e) {
                    // If receipts.json doesn't exist, create empty data
                    const emptyData = { receipts: [], streak: 0, last_receipt_date: null };
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(emptyData));
                }
            }
        }
        
        function getData() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : { receipts: [], streak: 0, last_receipt_date: null };
        }
        
        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }
        
        function updateDisplay() {
            const data = getData();
            
            document.getElementById('total-receipts').textContent = data.receipts.length;
            document.getElementById('streak-value').textContent = data.streak;
            document.getElementById('total-impact').textContent = data.receipts.reduce((acc, r) => acc + r.impact, 0);
            
            const container = document.getElementById('receipt-container');
            if (data.receipts.length === 0) {
                container.innerHTML = '<div class="empty-state">No receipts logged yet. Your competence is waiting for evidence.</div>';
                return;
            }
            
            const sorted = [...data.receipts].reverse();
            container.innerHTML = sorted.map(r => `
                <div class="receipt-card">
                    <div class="receipt-header">
                        <div class="receipt-title">${r.title}</div>
                        <div class="receipt-date">${new Date(r.date).toLocaleDateString()}</div>
                    </div>
                    <div class="receipt-meta">
                        <span class="category-tag">${r.category}</span>
                        <span>Impact: <span class="impact-tag">${r.impact}/10</span></span>
                        <span>Confidence: ${r.confidence_score}/10</span>
                    </div>
                </div>
            `).join('');
        }
        
        function addReceipt(title, category, impact, confidence) {
            const data = getData();
            const now = new Date();
            
            const newReceipt = {
                id: data.receipts.length + 1,
                date: now.toISOString(),
                title: title,
                category: category,
                impact: impact,
                confidence_score: confidence
            };
            
            // Update streak
            const lastDate = data.last_receipt_date;
            if (lastDate) {
                const lastDt = new Date(lastDate);
                const daysDiff = Math.floor((now - lastDt) / (1000 * 60 * 60 * 24));
                if (daysDiff === 1) {
                    data.streak += 1;
                } else if (daysDiff > 1) {
                    data.streak = 1;
                }
            } else {
                data.streak = 1;
            }
            
            data.last_receipt_date = now.toISOString();
            data.receipts.push(newReceipt);
            saveData(data);
            updateDisplay();
        }
        
        // Slider value updates
        document.getElementById('impact').addEventListener('input', (e) => {
            document.getElementById('impact-value').textContent = e.target.value;
        });
        
        document.getElementById('confidence').addEventListener('input', (e) => {
            document.getElementById('confidence-value').textContent = e.target.value;
        });
        
        // Form submission
        document.getElementById('receipt-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const impact = parseInt(document.getElementById('impact').value);
            const confidence = parseInt(document.getElementById('confidence').value);
            
            addReceipt(title, category, impact, confidence);
            
            // Reset form
            e.target.reset();
            document.getElementById('impact-value').textContent = '5';
            document.getElementById('confidence-value').textContent = '5';
            
            // Show success message
            const successMsg = document.getElementById('success-message');
            successMsg.style.display = 'block';
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);
        });
        
        // Initialize on page load
        (async () => {
            await initializeData();
            updateDisplay();
        })();
    </script>
</body>
</html>
