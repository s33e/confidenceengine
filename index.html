<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confidence Receipts Engine</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; background-color: #0d1117; color: #c9d1d9; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        h1, h2 { color: #58a6ff; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #161b22; padding: 20px; border-radius: 8px; border: 1px solid #30363d; text-align: center; }
        .stat-value { font-size: 2.5em; font-weight: bold; color: #f0f6fc; }
        .stat-label { color: #8b949e; text-transform: uppercase; font-size: 0.8em; }
        .receipt-list { display: flex; flex-direction: column; gap: 15px; }
        .receipt-card { background: #161b22; padding: 15px; border-radius: 8px; border-left: 4px solid #58a6ff; border-top: 1px solid #30363d; border-right: 1px solid #30363d; border-bottom: 1px solid #30363d; }
        .receipt-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .receipt-title { font-weight: bold; font-size: 1.1em; color: #f0f6fc; }
        .receipt-date { color: #8b949e; font-size: 0.9em; }
        .receipt-meta { font-size: 0.9em; display: flex; gap: 15px; }
        .category-tag { padding: 2px 8px; border-radius: 12px; background: #1f6feb; color: white; font-size: 0.8em; }
        .impact-tag { color: #3fb950; font-weight: bold; }
        .empty-state { text-align: center; color: #8b949e; margin-top: 50px; }
    </style>
</head>
<body>
    <h1>Confidence Receipts Wall 🎩</h1>
    <p>Undeniable evidence of capability and competence.</p>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="total-receipts">0</div>
            <div class="stat-label">Receipts</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="streak-value">0</div>
            <div class="stat-label">Day Streak</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="total-impact">0</div>
            <div class="stat-label">Total Impact</div>
        </div>
    </div>

    <h2>Evidence Log</h2>
    <div id="receipt-container" class="receipt-list">
        <!-- Receipts will be injected here -->
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('receipts.json');
                const data = await response.json();
                
                document.getElementById('total-receipts').textContent = data.receipts.length;
                document.getElementById('streak-value').textContent = data.streak;
                document.getElementById('total-impact').textContent = data.receipts.reduce((acc, r) => acc + r.impact, 0);
                
                const container = document.getElementById('receipt-container');
                if (data.receipts.length === 0) {
                    container.innerHTML = '<div class="empty-state">No receipts logged yet. Your competence is waiting for evidence.</div>';
                    return;
                }
                
                const sorted = [...data.receipts].reverse();
                container.innerHTML = sorted.map(r => `
                    <div class="receipt-card">
                        <div class="receipt-header">
                            <div class="receipt-title">${r.title}</div>
                            <div class="receipt-date">${new Date(r.date).toLocaleDateString()}</div>
                        </div>
                        <div class="receipt-meta">
                            <span class="category-tag">${r.category}</span>
                            <span>Impact: <span class="impact-tag">${r.impact}/10</span></span>
                            <span>Confidence: ${r.confidence_score}/10</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error("Failed to load receipts", e);
                document.getElementById('receipt-container').innerHTML = '<div class="empty-state">Unable to load receipts. Ensure receipts.json exists.</div>';
            }
        }
        loadData();
    </script>
</body>
</html>
